
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grain X | Terminal Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        background: '#050505',
                        surface: '#0c0c0c',
                        surfaceHover: '#121212',
                        border: '#1a1a1a',
                        borderHover: '#262626',
                        primary: '#00ff88',
                        primaryHover: '#00cc6a',
                        danger: '#ff3366',
                        warning: '#ffaa00',
                        info: '#00aaff',
                        textPrimary: '#ffffff',
                        textSecondary: '#999999',
                        textMuted: '#555555'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ff88;
        }
        html, body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            width: 100%;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        /* Scanline Overlay - Subtle */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            opacity: 0.08;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-animation {
            animation: ticker 30s linear infinite;
            display: flex;
            width: fit-content;
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }
        #root:empty {
            background-color: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
        #root:empty::after {
            content: "GRAIN_X_TERMINAL_INITIALIZING...";
            font-family: 'JetBrains Mono', monospace;
            color: #00ff88;
            font-size: 10px;
            letter-spacing: 0.3em;
            animation: pulse 2s infinite;
            padding: 20px;
            text-align: center;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Mobile Font Scaling Fix */
        @media (max-width: 640px) {
            h1 { font-size: 2.5rem !important; line-height: 1.1 !important; }
            h2 { font-size: 2rem !important; }
            .glow-text { text-shadow: 0 0 5px rgba(0, 255, 136, 0.4); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
